name: Update Buffer Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., 1.7.0). Leave empty to auto-detect latest version."
        required: false
        type: string
  schedule:
    - cron: "0 */12 * * *"

jobs:
  update-cask:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest version and check for updates
        id: version_check
        run: |
          # 获取当前 cask 中的版本
          CURRENT_VERSION=$(grep 'version "' Casks/buffer.rb | sed 's/.*version "\(.*\)".*/\1/')
          echo "Current version: $CURRENT_VERSION"

          # 如果手动指定了版本，使用指定的版本
          if [ -n "${{ inputs.version }}" ]; then
            NEW_VERSION="${{ inputs.version }}"
            echo "Using manually specified version: $NEW_VERSION"
          else
            # 从 GitHub API 获取最新版本
            RELEASE_INFO=$(curl -f -s "https://api.github.com/repos/samirpatil2000/Buffer/releases/latest")
            if [ $? -ne 0 ]; then
              echo "Failed to fetch release info"
              exit 1
            fi

            # 解析版本号，格式为 buffer-vX.Y
            NEW_VERSION=$(echo "$RELEASE_INFO" | sed -n 's/.*"tag_name": *"buffer-v\([^"]*\)".*/\1/p' | head -n 1)
            if [ -z "$NEW_VERSION" ]; then
              echo "Failed to parse version from release info"
              exit 1
            fi
            echo "Latest available version: $NEW_VERSION"
          fi

          # 比较版本
          if [ "$CURRENT_VERSION" = "$NEW_VERSION" ]; then
            echo "No update needed. Current version ($CURRENT_VERSION) is up to date."
            echo "should_update=false" >> $GITHUB_OUTPUT
          else
            echo "Update available: $CURRENT_VERSION -> $NEW_VERSION"
            echo "should_update=true" >> $GITHUB_OUTPUT
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Download DMG files
        if: steps.version_check.outputs.should_update == 'true'
        run: |
          # Download Silicon (arm64) DMG
          curl -f -L -o /tmp/buffer-silicon.dmg "https://github.com/samirpatil2000/Buffer/releases/download/buffer-v${{ steps.version_check.outputs.new_version }}/Buffer_Silicon.dmg"
          if [ ! -s /tmp/buffer-silicon.dmg ] || [ $(stat -c%s /tmp/buffer-silicon.dmg) -lt 100000 ]; then
            echo "Silicon DMG file is missing or too small"
            exit 1
          fi

          # Download Intel (x64) DMG
          curl -f -L -o /tmp/buffer-intel.dmg "https://github.com/samirpatil2000/Buffer/releases/download/buffer-v${{ steps.version_check.outputs.new_version }}/Buffer_Intel.dmg"
          if [ ! -s /tmp/buffer-intel.dmg ] || [ $(stat -c%s /tmp/buffer-intel.dmg) -lt 100000 ]; then
            echo "Intel DMG file is missing or too small"
            exit 1
          fi

      - name: Calculate checksums
        if: steps.version_check.outputs.should_update == 'true'
        id: checksums
        run: |
          SILICON_SHA256=$(sha256sum /tmp/buffer-silicon.dmg | awk '{print $1}')
          INTEL_SHA256=$(sha256sum /tmp/buffer-intel.dmg | awk '{print $1}')
          echo "silicon_sha256=$SILICON_SHA256" >> $GITHUB_OUTPUT
          echo "intel_sha256=$INTEL_SHA256" >> $GITHUB_OUTPUT
          echo "Silicon SHA256: $SILICON_SHA256"
          echo "Intel SHA256: $INTEL_SHA256"

      - name: Update cask file
        if: steps.version_check.outputs.should_update == 'true'
        run: |
          # Update version
          sed -i "s/version \".*\"/version \"${{ steps.version_check.outputs.new_version }}\"/" Casks/buffer.rb

          # Update sha256 in on_arm block
          sed -i '/on_arm do/,/end/{s/sha256 ".*"/sha256 "${{ steps.checksums.outputs.silicon_sha256 }}"/}' Casks/buffer.rb

          # Update sha256 in on_intel block
          sed -i '/on_intel do/,/end/{s/sha256 ".*"/sha256 "${{ steps.checksums.outputs.intel_sha256 }}"/}' Casks/buffer.rb

      - name: Show changes
        if: steps.version_check.outputs.should_update == 'true'
        run: |
          git diff Casks/buffer.rb

      - name: Commit and push changes
        if: steps.version_check.outputs.should_update == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Casks/buffer.rb

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update Buffer to version ${{ steps.version_check.outputs.new_version }}"
          git push

      - name: Summary
        if: always()
        run: |
          echo "## Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Current Version**: ${{ steps.version_check.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Latest Version**: ${{ steps.version_check.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Update Required**: ${{ steps.version_check.outputs.should_update }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.version_check.outputs.should_update }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Successfully updated to version ${{ steps.version_check.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No update needed. Already on the latest version." >> $GITHUB_STEP_SUMMARY
          fi