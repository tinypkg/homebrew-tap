name: Update CC Switch CLI Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., 5.2.1). Leave empty to auto-detect latest version."
        required: false
        type: string
  schedule:
    - cron: "0 */12 * * *"

jobs:
  update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest version and check for updates
        id: version_check
        run: |
          # Get current version from formula
          CURRENT_VERSION=$(grep 'version "' Formula/cc-switch-cli.rb | sed 's/.*version "\(.*\)".*/\1/')
          echo "Current version: $CURRENT_VERSION"

          # If version is manually specified, use it
          if [ -n "${{ inputs.version }}" ]; then
            NEW_VERSION="${{ inputs.version }}"
            echo "Using manually specified version: $NEW_VERSION"
          else
            # Get latest version from GitHub API
            RELEASE_INFO=$(curl -f -s "https://api.github.com/repos/SaladDay/cc-switch-cli/releases/latest")
            if [ $? -ne 0 ]; then
              echo "Failed to fetch release info"
              exit 1
            fi

            NEW_VERSION=$(echo "$RELEASE_INFO" | sed -n 's/.*"tag_name": *"v\([^"]*\)".*/\1/p' | head -n 1)
            if [ -z "$NEW_VERSION" ]; then
              echo "Failed to parse version from release info"
              exit 1
            fi
            echo "Latest available version: $NEW_VERSION"
          fi

          # Compare versions
          if [ "$CURRENT_VERSION" = "$NEW_VERSION" ]; then
            echo "No update needed. Current version ($CURRENT_VERSION) is up to date."
            echo "should_update=false" >> $GITHUB_OUTPUT
          else
            echo "Update available: $CURRENT_VERSION -> $NEW_VERSION"
            echo "should_update=true" >> $GITHUB_OUTPUT
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Download arm64 tar.gz
        if: steps.version_check.outputs.should_update == 'true'
        run: |
          curl -f -L -o /tmp/cc-switch-cli-arm64.tar.gz "https://github.com/SaladDay/cc-switch-cli/releases/download/v${{ steps.version_check.outputs.new_version }}/cc-switch-cli-darwin-arm64.tar.gz"
          if [ ! -s /tmp/cc-switch-cli-arm64.tar.gz ] || [ $(stat -c%s /tmp/cc-switch-cli-arm64.tar.gz) -lt 1000 ]; then
            echo "arm64 tar.gz file is missing or too small"
            exit 1
          fi

      - name: Download x64 tar.gz
        if: steps.version_check.outputs.should_update == 'true'
        run: |
          curl -f -L -o /tmp/cc-switch-cli-x64.tar.gz "https://github.com/SaladDay/cc-switch-cli/releases/download/v${{ steps.version_check.outputs.new_version }}/cc-switch-cli-darwin-x64.tar.gz"
          if [ ! -s /tmp/cc-switch-cli-x64.tar.gz ] || [ $(stat -c%s /tmp/cc-switch-cli-x64.tar.gz) -lt 1000 ]; then
            echo "x64 tar.gz file is missing or too small"
            exit 1
          fi

      - name: Calculate checksums
        if: steps.version_check.outputs.should_update == 'true'
        id: checksums
        run: |
          ARM64_SHA256=$(sha256sum /tmp/cc-switch-cli-arm64.tar.gz | awk '{print $1}')
          X64_SHA256=$(sha256sum /tmp/cc-switch-cli-x64.tar.gz | awk '{print $1}')
          echo "arm64_sha256=$ARM64_SHA256" >> $GITHUB_OUTPUT
          echo "x64_sha256=$X64_SHA256" >> $GITHUB_OUTPUT
          echo "ARM64 SHA256: $ARM64_SHA256"
          echo "X64 SHA256: $X64_SHA256"

      - name: Update formula file
        if: steps.version_check.outputs.should_update == 'true'
        run: |
          # Update version
          sed -i "s/version \".*\"/version \"${{ steps.version_check.outputs.new_version }}\"/" Formula/cc-switch-cli.rb

          # Update version in URLs
          sed -i "s|/v[0-9.]*\/|/v${{ steps.version_check.outputs.new_version }}/|g" Formula/cc-switch-cli.rb

          # Update arm64 sha256
          sed -i '/if Hardware::CPU.arm?/,/if Hardware::CPU.intel?/{s/sha256 ".*"/sha256 "${{ steps.checksums.outputs.arm64_sha256 }}"/}' Formula/cc-switch-cli.rb

          # Update x64 sha256
          sed -i '/if Hardware::CPU.intel?/,/end/{s/sha256 ".*"/sha256 "${{ steps.checksums.outputs.x64_sha256 }}"/}' Formula/cc-switch-cli.rb

      - name: Show changes
        if: steps.version_check.outputs.should_update == 'true'
        run: |
          git diff Formula/cc-switch-cli.rb

      - name: Commit and push changes
        if: steps.version_check.outputs.should_update == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Formula/cc-switch-cli.rb

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update CC Switch CLI to version ${{ steps.version_check.outputs.new_version }}"
          git push

      - name: Summary
        if: always()
        run: |
          echo "## Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Current Version**: ${{ steps.version_check.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Latest Version**: ${{ steps.version_check.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Update Required**: ${{ steps.version_check.outputs.should_update }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.version_check.outputs.should_update }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Successfully updated to version ${{ steps.version_check.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No update needed. Already on the latest version." >> $GITHUB_STEP_SUMMARY
          fi