name: Update dbx Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., 0.3.3)"
        required: true
        type: string

jobs:
  update-cask:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get current version
        id: version_check
        run: |
          CURRENT_VERSION=$(grep 'version "' Casks/dbx.rb | sed 's/.*version "\(.*\)".*/\1/')
          echo "Current version: $CURRENT_VERSION"
          NEW_VERSION="${{ inputs.version }}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Download x64 DMG
        run: |
          curl -f -L -o /tmp/dbx-x64.dmg "https://github.com/t8y2/dbx/releases/download/v${{ steps.version_check.outputs.new_version }}/dbx_${{ steps.version_check.outputs.new_version }}_x64.dmg"

      - name: Download arm64 DMG
        run: |
          curl -f -L -o /tmp/dbx-arm64.dmg "https://github.com/t8y2/dbx/releases/download/v${{ steps.version_check.outputs.new_version }}/dbx_${{ steps.version_check.outputs.new_version }}_aarch64.dmg"

      - name: Calculate checksums
        id: checksums
        run: |
          X64_SHA256=$(sha256sum /tmp/dbx-x64.dmg | awk '{print $1}')
          ARM64_SHA256=$(sha256sum /tmp/dbx-arm64.dmg | awk '{print $1}')
          echo "x64_sha256=$X64_SHA256" >> $GITHUB_OUTPUT
          echo "arm64_sha256=$ARM64_SHA256" >> $GITHUB_OUTPUT

      - name: Update cask file
        run: |
          # Update version
          sed -i "s/version \".*\"/version \"${{ steps.version_check.outputs.new_version }}\"/" Casks/dbx.rb
          # Update x64 sha256 in on_intel block
          sed -i '/on_intel do/,/end/{s/sha256 ".*"/sha256 "${{ steps.checksums.outputs.x64_sha256 }}"/}' Casks/dbx.rb
          # Update arm64 sha256 in on_arm block
          sed -i '/on_arm do/,/end/{s/sha256 ".*"/sha256 "${{ steps.checksums.outputs.arm64_sha256 }}"/}' Casks/dbx.rb

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Casks/dbx.rb
          git diff --cached --quiet || git commit -m "chore: update dbx to version ${{ steps.version_check.outputs.new_version }}"
          git push