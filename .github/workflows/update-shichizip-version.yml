name: Update ShichiZip Versions

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., 0.0.3). Leave empty to auto-detect latest version."
        required: false
        type: string
  schedule:
    - cron: "0 */12 * * *"

jobs:
  update-casks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest version and check for updates
        id: version_check
        run: |
          # 获取当前 cask 中的版本
          CURRENT_VERSION=$(grep 'version "' Casks/shichizip.rb | sed 's/.*version "\(.*\)".*/\1/')
          echo "Current version: $CURRENT_VERSION"

          # 如果手动指定了版本，使用指定的版本
          if [ -n "${{ inputs.version }}" ]; then
            NEW_VERSION="${{ inputs.version }}"
            echo "Using manually specified version: $NEW_VERSION"
          else
            # 从 GitHub API 获取最新版本
            RELEASE_INFO=$(curl -f -s "https://api.github.com/repos/idawnlight/ShichiZip/releases/latest")
            if [ $? -ne 0 ]; then
              echo "Failed to fetch release info"
              exit 1
            fi

            NEW_VERSION=$(echo "$RELEASE_INFO" | sed -n 's/.*"tag_name": *"v\([^"]*\)".*/\1/p' | head -n 1)
            if [ -z "$NEW_VERSION" ]; then
              echo "Failed to parse version from release info"
              exit 1
            fi
            echo "Latest available version: $NEW_VERSION"
          fi

          # 比较版本
          if [ "$CURRENT_VERSION" = "$NEW_VERSION" ]; then
            echo "No update needed. Current version ($CURRENT_VERSION) is up to date."
            echo "should_update=false" >> $GITHUB_OUTPUT
          else
            echo "Update available: $CURRENT_VERSION -> $NEW_VERSION"
            echo "should_update=true" >> $GITHUB_OUTPUT
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Download and calculate checksums
        if: steps.version_check.outputs.should_update == 'true'
        id: checksums
        run: |
          VERSION="${{ steps.version_check.outputs.new_version }}"

          # Download ShichiZip arm64
          curl -f -L -o /tmp/shichizip-arm64.zip "https://github.com/idawnlight/ShichiZip/releases/download/v${VERSION}/ShichiZip-Release-arm64.zip"
          SHICHIZIP_ARM64_SHA256=$(sha256sum /tmp/shichizip-arm64.zip | awk '{print $1}')
          echo "shichizip_arm64_sha256=$SHICHIZIP_ARM64_SHA256" >> $GITHUB_OUTPUT
          echo "ShichiZip arm64 SHA256: $SHICHIZIP_ARM64_SHA256"

          # Download ShichiZip x86_64
          curl -f -L -o /tmp/shichizip-x64.zip "https://github.com/idawnlight/ShichiZip/releases/download/v${VERSION}/ShichiZip-Release-x86_64.zip"
          SHICHIZIP_X64_SHA256=$(sha256sum /tmp/shichizip-x64.zip | awk '{print $1}')
          echo "shichizip_x64_sha256=$SHICHIZIP_X64_SHA256" >> $GITHUB_OUTPUT
          echo "ShichiZip x86_64 SHA256: $SHICHIZIP_X64_SHA256"

          # Download ShichiZipZS arm64
          curl -f -L -o /tmp/shichizipzs-arm64.zip "https://github.com/idawnlight/ShichiZip/releases/download/v${VERSION}/ShichiZipZS-Release-arm64.zip"
          SHICHIZIPZS_ARM64_SHA256=$(sha256sum /tmp/shichizipzs-arm64.zip | awk '{print $1}')
          echo "shichizipzs_arm64_sha256=$SHICHIZIPZS_ARM64_SHA256" >> $GITHUB_OUTPUT
          echo "ShichiZipZS arm64 SHA256: $SHICHIZIPZS_ARM64_SHA256"

          # Download ShichiZipZS x86_64
          curl -f -L -o /tmp/shichizipzs-x64.zip "https://github.com/idawnlight/ShichiZip/releases/download/v${VERSION}/ShichiZipZS-Release-x86_64.zip"
          SHICHIZIPZS_X64_SHA256=$(sha256sum /tmp/shichizipzs-x64.zip | awk '{print $1}')
          echo "shichizipzs_x64_sha256=$SHICHIZIPZS_X64_SHA256" >> $GITHUB_OUTPUT
          echo "ShichiZipZS x86_64 SHA256: $SHICHIZIPZS_X64_SHA256"

      - name: Update cask files
        if: steps.version_check.outputs.should_update == 'true'
        run: |
          VERSION="${{ steps.version_check.outputs.new_version }}"

          # Update shichizip.rb
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/shichizip.rb
          sed -i '/on_arm do/,/end/{s/sha256 ".*"/sha256 "${{ steps.checksums.outputs.shichizip_arm64_sha256 }}"/}' Casks/shichizip.rb
          sed -i '/on_intel do/,/end/{s/sha256 ".*"/sha256 "${{ steps.checksums.outputs.shichizip_x64_sha256 }}"/}' Casks/shichizip.rb

          # Update shichizip-zs.rb
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/shichizip-zs.rb
          sed -i '/on_arm do/,/end/{s/sha256 ".*"/sha256 "${{ steps.checksums.outputs.shichizipzs_arm64_sha256 }}"/}' Casks/shichizip-zs.rb
          sed -i '/on_intel do/,/end/{s/sha256 ".*"/sha256 "${{ steps.checksums.outputs.shichizipzs_x64_sha256 }}"/}' Casks/shichizip-zs.rb

      - name: Show changes
        if: steps.version_check.outputs.should_update == 'true'
        run: |
          git diff Casks/shichizip.rb Casks/shichizip-zs.rb

      - name: Commit and push changes
        if: steps.version_check.outputs.should_update == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Casks/shichizip.rb Casks/shichizip-zs.rb

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update ShichiZip to version ${{ steps.version_check.outputs.new_version }}"
          git push

      - name: Summary
        if: always()
        run: |
          echo "## Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Current Version**: ${{ steps.version_check.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Latest Version**: ${{ steps.version_check.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Update Required**: ${{ steps.version_check.outputs.should_update }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.version_check.outputs.should_update }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### SHA256 Checksums" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**ShichiZip:**" >> $GITHUB_STEP_SUMMARY
            echo "- arm64: ${{ steps.checksums.outputs.shichizip_arm64_sha256 }}" >> $GITHUB_STEP_SUMMARY
            echo "- x86_64: ${{ steps.checksums.outputs.shichizip_x64_sha256 }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**ShichiZipZS:**" >> $GITHUB_STEP_SUMMARY
            echo "- arm64: ${{ steps.checksums.outputs.shichizipzs_arm64_sha256 }}" >> $GITHUB_STEP_SUMMARY
            echo "- x86_64: ${{ steps.checksums.outputs.shichizipzs_x64_sha256 }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No update needed. Already on the latest version." >> $GITHUB_STEP_SUMMARY
          fi